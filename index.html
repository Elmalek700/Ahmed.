<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0b0b0b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: 0.3s;
}

.container {
  text-align: center;
}

h1 {
  font-size: 50px;
  margin-bottom: 30px;
  letter-spacing: 2px;
}

.button {
  display: block;
  width: 280px;
  margin: 12px auto;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #1b1b1b;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.25s;
}

.button:hover {
  transform: scale(1.05);
  background: #8a2be2;
}

.copy-box {
  background: #121212;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
  display: none;
}

textarea {
  width: 100%;
  height: 120px;
  background: #000;
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 10px;
}

.copy-btn {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #8a2be2;
  color: white;
  cursor: pointer;
}

.mode {
  position: absolute;
  top: 20px;
  right: 20px;
  cursor: pointer;
  font-size: 14px;
  background: #1b1b1b;
  padding: 8px 12px;
  border-radius: 10px;
}

.lang {
  position: absolute;
  top: 20px;
  left: 20px;
  cursor: pointer;
  font-size: 14px;
  background: #1b1b1b;
  padding: 8px 12px;
  border-radius: 10px;
}

.footer {
  margin-top: 25px;
  opacity: 0.7;
  font-size: 14px;
}

.light-mode {
  background: #ffffff;
  color: black;
}

.light-mode .button {
  background: #eee;
  color: black;
}

.light-mode textarea {
  background: #f3f3f3;
  color: black;
}
</style></head><body><div class="lang" onclick="toggleLang()">AR / EN</div>
<div class="mode" onclick="toggleMode()">Dark / Light</div><div class="container"><h1>Ahmed</h1><button class="button" onclick="showScript()" id="btn1">Universal Script</button> <button class="button">Discord Server</button> <button class="button">YouTube Channel</button> <button class="button">Scripts Website</button>

<div class="copy-box" id="scriptBox">
<textarea id="script">loadstring(game:HttpGet("https://example.com/script.lua"))()</textarea>
<button class="copy-btn" onclick="copyScript()">Copy Script</button>
</div><div class="footer"><svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="margin-top:10px;">
<path d="M20 0H4C1.8 0 0 1.8 0 4v16c0 2.2 1.8 4 4 4h13.5l-.6-2.1 1.5 1.4 1.4 1.3L24 24V4c0-2.2-1.8-4-4-4z"/>
</svg><div>d.e.x_4</div></div></div><script>
function showScript() {
  document.getElementById("scriptBox").style.display = "block";
}

function copyScript() {
  var copyText = document.getElementById("script");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(copyText.value);
  alert("Script copied!");
}

function toggleMode() {
  document.body.classList.toggle("light-mode");
}

let isArabic = true;
function toggleLang() {
  const btn = document.getElementById("btn1");

  if (isArabic) {
    btn.innerText = "سكريبت شامل";
  } else {
    btn.innerText = "Universal Script";
  }

  isArabic = !isArabic;
}
</script></body>
</html>
